name: Ichimoku Screener

on:
  schedule:
    - cron: '*/10 0-6 * * 1-5'  # 場中 9:00〜15:50 JST (UTC 0:00〜6:50), 10分おき
    - cron: '30 7 * * 1-5'      # 大引け後 16:30 JST (UTC 7:30)
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python screener.py

      - name: Commit and push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update screener $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
            git push
          fi
